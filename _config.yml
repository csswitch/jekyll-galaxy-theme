title: "Galaxy Theme"
description: "A deep-space Jekyll theme with starfield background, constellation navigation, and nebula accents."
url: "https://csswitch.github.io"
baseurl: "/jekyll-galaxy-theme"
author:
  name: "Your Name"
  email: "you@example.com"
  github: ""
  twitter: ""

galaxy:
  nebula: "purple"
  stars: "normal"
  shooting_stars: true
  constellation_nav: true
  comet_progress: true

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
timezone: UTC
paginate: 6
paginate_path: "/page:num/"

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor